<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feliz Aniversário</title>

    <link rel="icon" type="image/png" href="images/favicon-birthday.png">
    <link rel="stylesheet" href="main.css">
</head>

<body>

    <h1>✨Feliz Anivesário Laís!!!✨</h1>
    
   <div class="quadro-branco">

    <!-- voltar -->
    <button class="seta esquerda" onclick="mudarSlide(-1)">◀</button>

    <!-- frase -->
    <h3 id="frase"></h3>

    <!-- spotify -->
    <iframe 
        id="spotify"
        width="100%"
        height="152"
        frameborder="0"
        allow="autoplay; encrypted-media">
    </iframe>

    <!-- fotos -->
    <div id="fotos" class="grid-fotos"></div>

    <!-- cartinha -->
    <button class="botao-carta" onclick="abrirPopup()">Abrir cartinha 💌</button>

    <!-- avançar -->
    <button class="seta direita" onclick="mudarSlide(1)">▶</button>

</div>
<div id="vizualizador" class = "vizualizador" onclick="fecharImagem()">
    <img id = "img-ampliada">
</div>

<!-- popup -->
<div id="popup-carta" class="popup">
    <div class="conteudo-popup">
        <p id="texto-carta"></p>
        <button class = "fechar-popup" onclick="fecharPopup()">Fechar</button>
    </div>
</div>

<script src="app.js"></script>

</body>
</html>
